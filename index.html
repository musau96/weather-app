<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf 🐺 Weather App 🌦️</title>

<style>
/* === Background Gradient Animation === */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    color: white;
    text-align: center;
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #1f4037, #99f2c8);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* === Container === */
.container {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
    backdrop-filter: blur(10px);
    animation: fadeIn 1s ease;
}

/* === Buttons === */
button {
    padding: 10px;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.8);
    color: #0077ff;
    font-weight: bold;
    transition: transform 0.3s ease, background 0.3s ease;
}

button:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,1);
}

/* === Input === */
input {
    padding: 10px;
    width: 70%;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
}

/* === Weather Display Animation === */
#weather {
    margin-top: 20px;
    animation: fadeIn 1s ease;
}

/* === Fade-in animation === */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="container">
    <h2>🌦️ Musau Weather App</h2>
    <input type="text" id="city" placeholder="Enter city">
    <br>
    <button onclick="getWeather()">Search</button>
    <button onclick="getLocationWeather()">Use My Location</button>
    <div id="weather"></div>
</div>

<script>
function showLoading() {
    document.getElementById("weather").innerHTML = "Loading...";
}

async function getWeather() {
    const city = document.getElementById("city").value;
    if (!city) return alert("Enter a city");

    showLoading();

    try {
        const geo = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${city}`
        );
        const geoData = await geo.json();
        if (!geoData.results) throw "City not found";

        const { latitude, longitude, name } = geoData.results[0];
        fetchWeather(latitude, longitude, name);

    } catch (err) {
        document.getElementById("weather").innerHTML = "Error: " + err;
    }
}

function getLocationWeather() {
    if (navigator.geolocation) {
        showLoading();
        navigator.geolocation.getCurrentPosition(pos => {
            fetchWeather(pos.coords.latitude, pos.coords.longitude, "Your Location");
        });
    } else {
        alert("Geolocation not supported");
    }
}

async function fetchWeather(lat, lon, place) {
    try {
        const res = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,apparent_temperature&timezone=auto`
        );

        const data = await res.json();
        const temp = data.current_weather.temperature;
        const wind = data.current_weather.windspeed;
        const humidity = data.hourly.relativehumidity_2m[0];
        const feels = data.hourly.apparent_temperature[0];

        document.getElementById("weather").innerHTML = `
            <h3>${place}</h3>
            <h1>${temp}°C</h1>
            <p>💨 Wind: ${wind} km/h</p>
            <p>💧 Humidity: ${humidity}%</p>
            <p>🌡️ Feels like: ${feels}°C</p>
            <button onclick="location.reload()">Refresh</button>
        `;

    } catch {
        document.getElementById("weather").innerHTML = "Failed to load weather.";
    }
}
</script>

</body>
</html>
